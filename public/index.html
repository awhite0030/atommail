<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtomMail — Temporary Email</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.container{max-width:640px;width:100%;padding:24px}
header{text-align:center;padding:60px 0 40px}
h1{font-size:2.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px}
.tagline{color:#888;font-size:1rem}
.btn{padding:12px 28px;border-radius:999px;border:none;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:#fff;color:#000}
.btn-primary:hover{background:#e0e0e0}
.btn-secondary{background:transparent;color:#fff;border:1px solid #222}
.btn-secondary:hover{background:#1a1a1a}
.hidden{display:none}
.address-box{background:#111;border:1px solid #222;border-radius:12px;padding:20px;margin:24px 0;display:flex;align-items:center;justify-content:space-between;gap:12px}
.address{font-family:'SF Mono',Monaco,monospace;font-size:1.1rem}
.copy-btn{background:#222;color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.85rem}
.copy-btn:hover{background:#333}
.timer{text-align:center;font-size:1.5rem;font-weight:600;margin:12px 0;color:#888;font-variant-numeric:tabular-nums}
.timer.urgent{color:#f44}
.email-list{list-style:none;margin:16px 0}
.email-item{background:#111;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:8px;cursor:pointer;transition:background 0.15s}
.email-item:hover{background:#1a1a1a}
.sender{font-weight:600;font-size:0.9rem;margin-bottom:4px}
.subject{color:#888;font-size:0.85rem}
.time{color:#555;font-size:0.75rem;margin-top:4px}
.empty{text-align:center;color:#888;padding:40px 0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-content{background:#111;border:1px solid #222;border-radius:16px;max-width:640px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
.modal h2{font-size:1.2rem;margin-bottom:4px}
.meta{color:#888;font-size:0.85rem;margin-bottom:16px}
.body{border-top:1px solid #222;padding-top:16px;line-height:1.6}
.close-row{display:flex;justify-content:flex-end;margin-bottom:12px}
.actions{display:flex;gap:10px;justify-content:center;margin:20px 0}
.fade-in{animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){h1{font-size:1.8rem}.container{padding:16px}.address-box{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<header>
<h1>AtomMail</h1>
<p class="tagline">Temporary Email — 10 minutes</p>
</header>
<div class="container">
<div id="create-section" style="text-align:center">
<button class="btn btn-primary" onclick="createInbox()">Create Address</button>
</div>
<div id="inbox-section" class="hidden">
<div class="address-box fade-in">
<code class="address" id="address"></code>
<button class="copy-btn" onclick="copyAddress()">Copy</button>
</div>
<div class="timer" id="timer">10:00</div>
<div class="actions">
<button class="btn btn-secondary" onclick="createInbox()">New Address</button>
</div>
<ul class="email-list" id="email-list">
<li class="empty">Waiting for emails...</li>
</ul>
</div>
</div>
<div id="modal" class="modal hidden"></div>
<script>
let currentAddress='',expiresAt=0,pollInterval=null,timerInterval=null;
async function createInbox(){
  const r=await fetch('/api/inbox',{method:'POST'});
  const d=await r.json();
  currentAddress=d.address;
  expiresAt=d.expiresAt;
  document.getElementById('create-section').classList.add('hidden');
  document.getElementById('inbox-section').classList.remove('hidden');
  document.getElementById('address').textContent=currentAddress;
  startTimer();
  startPolling();
}
function copyAddress(){
  navigator.clipboard.writeText(currentAddress);
  const btn=event.target;
  btn.textContent='Copied!';
  setTimeout(()=>btn.textContent='Copy',1500);
}
function startTimer(){clearInterval(timerInterval);timerInterval=setInterval(()=>{const left=Math.max(0,expiresAt-Date.now());const m=Math.floor(left/60000);const s=Math.floor((left%60000)/1000);const el=document.getElementById('timer');el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.classList.toggle('urgent',left<60000);if(left<=0){clearInterval(timerInterval);clearInterval(pollInterval);el.textContent='Expired'}},500)}
function startPolling(){
  clearInterval(pollInterval);
  fetchEmails();
  pollInterval=setInterval(fetchEmails,3000);
}
async function fetchEmails(){
  if(!currentAddress)return;
  try{
    const r=await fetch('/api/inbox/'+encodeURIComponent(currentAddress)+'/emails');
    const d=await r.json();
    if(d.expired){clearInterval(pollInterval);return}
    const list=document.getElementById('email-list');
    if(!d.emails||d.emails.length===0){
      list.innerHTML='<li class="empty">Waiting for emails...</li>';
      return;
    }
    list.innerHTML=d.emails.map(e=>
      '<li class="email-item" onclick="viewEmail('+e.id+')">'+
      '<div class="sender">'+esc(e.sender)+'</div>'+
      '<div class="subject">'+esc(e.subject||'(no subject)')+'</div>'+
      '<div class="time">'+new Date(e.received_at).toLocaleTimeString()+'</div>'+
      '</li>'
    ).join('');
  }catch(e){console.error(e)}
}
async function viewEmail(id){const r=await fetch('/api/email/'+id);const e=await r.json();const modal=document.getElementById('modal');const body=e.body_html?sanitize(e.body_html):'<pre style="white-space:pre-wrap">'+esc(e.body_text||'')+'</pre>';modal.innerHTML='<div class="modal-content fade-in"><div class="close-row"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div><h2>'+esc(e.subject||'(no subject)')+'</h2><div class="meta">From: '+esc(e.sender)+' · '+new Date(e.received_at).toLocaleString()+'</div><div class="body">'+body+'</div></div>';modal.classList.remove('hidden')}
function closeModal(){document.getElementById('modal').classList.add('hidden')}
function sanitize(html){const d=document.createElement('div');d.innerHTML=html;d.querySelectorAll('script,iframe,object,embed,form').forEach(n=>n.remove());d.querySelectorAll('*').forEach(el=>{[...el.attributes].forEach(a=>{if(a.name.startsWith('on'))el.removeAttribute(a.name)})});return d.innerHTML}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
